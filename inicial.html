<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Beauty</title>

    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">

        <div class="tela-logo1">
            <img id="img-logo" src="img/B.png" alt="Logo da Make Beauty">
        
          <div class="search-box">
            <input type="text" placeholder="Pesquisa">
           </div>
      
        </div>


        <div class="icones">
            <img id="carrinho" src="img/carrinho.png" alt="Carrinho">
            <img id="menu" src="img/menu.png" alt="Menu">
        </div>

    </header>

    <nav class="menu">
        <a href="#">Lábios</a>
        <a href="#">Rosto</a>
        <a href="#">Skin Care</a>
        <a href="#">Promoções</a>
    </nav>

    <main class="banner-section">

        <div class="tela-inicial">
            <img class="seta seta-esquerda" src="img/seta.png" alt="Seta esquerda">

            <img class="logo" src="img/tela.webp" alt="Banner principal">

            <img class="seta seta-direita" src="img/seta_direito.png" alt="Seta direita">
        </div>

    
    </main>

</html>
